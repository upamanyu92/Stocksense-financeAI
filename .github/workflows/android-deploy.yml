name: Android CI and Docker Deploy

on:
  push:
    branches: ["main", "copilot/**"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  JAVA_VERSION: "17"
  CI: true

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "platform-tools" "build-tools;34.0.0"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run unit and lint tests
        run: ./gradlew --no-daemon test lint

  assemble:
    name: Assemble Split APKs
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "platform-tools" "build-tools;34.0.0"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Prepare release keystore (optional)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        if: env.KEYSTORE_B64 != ''
        run: |
          echo "${KEYSTORE_B64}" | base64 --decode > keystore.jks
          cat > keystore.properties <<'EOF'
          storeFile=keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Assemble release APKs (split per ABI)
        run: ./gradlew --no-daemon assembleRelease

      - name: List built APKs
        run: find app/build/outputs/apk/release -name '*.apk' -exec ls -lh {} +

      - name: Upload all release APKs
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: assemble
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release APKs
        uses: actions/download-artifact@v4
        with:
          name: release-apks
          path: app/build/outputs/apk/release

      - name: Log in to GHCR
        env:
          CR_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${CR_PAT}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set image id
        run: echo "IMAGE_ID=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: docker build -t "${IMAGE_ID}:latest" -t "${IMAGE_ID}:${GITHUB_SHA}" .

      - name: Push Docker image
        run: |
          docker push "${IMAGE_ID}:latest"
          docker push "${IMAGE_ID}:${GITHUB_SHA}"

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: assemble
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release APKs
        uses: actions/download-artifact@v4
        with:
          name: release-apks
          path: app/build/outputs/apk/release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          fail_on_unmatched_files: true
